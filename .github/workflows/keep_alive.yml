name: Keep Alive - Ping QueryMyPDF

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping QueryMyPDF on Render
        run: |
          echo "Pinging https://querymypdf.onrender.com ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 https://querymypdf.onrender.com)
          echo "Response status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "✅ App is alive!"
          else
            echo "⚠️ App returned status $STATUS — may still be warming up."
          fi
